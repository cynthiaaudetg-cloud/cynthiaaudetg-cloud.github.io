<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>SignDoc</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#000;color:#fff;font-family:system-ui,sans-serif;overflow:hidden;}
body{display:flex;flex-direction:column;height:100dvh;}
#accueil{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:32px 24px;}
#accueil h1{font-size:32px;font-weight:800;text-align:center;}
#accueil h1 span{color:#39FF14;}
.gros-btn{width:100%;max-width:320px;padding:22px;border:none;border-radius:16px;font-size:18px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:12px;}
.gros-btn.vert{background:#39FF14;color:#000;}
.gros-btn.gris{background:#222;color:#fff;border:1px solid #444;}
input[type=file]{display:none;}
.note{font-size:12px;color:#555;text-align:center;}
#editeur{flex:1;display:none;flex-direction:column;}
.top-bar{background:#111;border-bottom:1px solid #333;padding:10px 12px;display:flex;gap:8px;align-items:center;flex-shrink:0;}
.top-bar button{padding:10px 16px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;}
.btn-signer{background:#A020F0;color:#fff;}
.btn-enreg{background:#39FF14;color:#000;}
.btn-retour{background:#222;color:#fff;border:1px solid #444;}
#zone-doc{flex:1;overflow:auto;background:#333;display:flex;align-items:flex-start;justify-content:center;padding:8px;position:relative;}
#le-canvas{display:block;touch-action:none;max-width:100%;}
#pad-ecran{display:none;position:fixed;inset:0;z-index:50;background:#000;flex-direction:column;}
.pad-top{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid #222;flex-shrink:0;}
.pad-top h2{font-size:17px;font-weight:800;}
.btn-x{width:34px;height:34px;background:#222;border:none;border-radius:50%;color:#aaa;font-size:18px;cursor:pointer;}
.btn-eff{padding:7px 16px;background:none;border:1px solid #444;border-radius:8px;color:#aaa;font-size:13px;font-weight:700;cursor:pointer;}
#zone-svg{flex:1;background:#fff;position:relative;overflow:hidden;}
#svg-sig{position:absolute;inset:0;width:100%;height:100%;touch-action:none;}
.ligne-guide{position:absolute;bottom:30%;left:5%;right:5%;height:1px;background:rgba(0,0,0,0.15);pointer-events:none;}
.pad-bot{display:flex;gap:10px;padding:14px 16px;border-top:1px solid #222;flex-shrink:0;}
.pad-bot button{flex:1;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;}
.btn-ann{background:#222;color:#fff;}
.btn-util{background:#39FF14;color:#000;}
#overlay-place{display:none;position:fixed;inset:0;z-index:40;background:rgba(57,255,20,0.12);align-items:center;justify-content:center;}
.msg-place{background:rgba(0,0,0,0.9);color:#39FF14;font-size:17px;font-weight:800;padding:18px 32px;border-radius:50px;border:2px solid #39FF14;text-align:center;}
#save-panel{display:none;position:fixed;inset:0;z-index:50;background:rgba(0,0,0,0.9);align-items:flex-end;justify-content:center;}
.save-sheet{background:#111;border-radius:20px 20px 0 0;padding:20px 16px 40px;width:100%;max-width:460px;border:1px solid #333;border-bottom:none;}
.save-sheet h2{font-size:18px;font-weight:800;margin-bottom:16px;}
.save-opt{display:flex;align-items:center;gap:14px;padding:16px;background:#000;border:1px solid #333;border-radius:12px;margin-bottom:10px;cursor:pointer;color:#fff;font-size:15px;font-weight:700;width:100%;text-align:left;}
.save-opt:active{border-color:#39FF14;}
.save-opt .ico{font-size:26px;}
.save-opt small{display:block;font-size:12px;color:#555;font-weight:400;}
.btn-ann2{width:100%;padding:14px;background:none;border:1px solid #444;border-radius:12px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;}
#loader{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:99;align-items:center;justify-content:center;}
.roue{width:48px;height:48px;border:4px solid #333;border-top-color:#A020F0;border-radius:50%;animation:tourne .7s linear infinite;}
@keyframes tourne{to{transform:rotate(360deg);}}
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:12px 24px;border-radius:40px;font-size:14px;font-weight:700;opacity:0;transition:opacity .25s;z-index:200;pointer-events:none;white-space:nowrap;border:1px solid #444;max-width:90vw;text-align:center;}
#toast.vis{opacity:1;}
</style>
</head>
<body>

<div id="accueil">
  <h1>Sign<span>Doc</span></h1>
  <label class="gros-btn vert" for="f-pdf">📄 Ouvrir un PDF</label>
  <label class="gros-btn gris" for="f-img">🖼️ Ouvrir une photo</label>
  <input type="file" id="f-pdf" accept="application/pdf">
  <input type="file" id="f-img" accept="image/*">
  <p class="note">Tes fichiers restent sur ton appareil.</p>
</div>

<div id="editeur">
  <div class="top-bar">
    <button class="btn-retour" onclick="retour()">← Retour</button>
    <span style="flex:1"></span>
    <button class="btn-signer" onclick="ouvrirPad()">✍️ Signer</button>
    <button class="btn-enreg" onclick="ouvrirSave()">💾 Enregistrer</button>
  </div>
  <div id="zone-doc">
    <canvas id="le-canvas"></canvas>
  </div>
</div>

<div id="pad-ecran">
  <div class="pad-top">
    <button class="btn-x" onclick="fermerPad()">✕</button>
    <h2>Ta signature</h2>
    <button class="btn-eff" onclick="effacerPad()">Effacer</button>
  </div>
  <div id="zone-svg">
    <canvas id="pad-canvas" style="position:absolute;inset:0;width:100%;height:100%;touch-action:none;background:#fff;display:block;"></canvas>
    <div class="ligne-guide"></div>
  </div>
  <div class="pad-bot">
    <button class="btn-ann" onclick="fermerPad()">Annuler</button>
    <button class="btn-util" onclick="utiliserSig()">Utiliser →</button>
  </div>
</div>

<div id="overlay-place">
  <div class="msg-place">👆 Touche ou mettre<br>ta signature</div>
</div>

<div id="save-panel">
  <div class="save-sheet">
    <h2>Enregistrer</h2>
    <button class="save-opt" onclick="sauvegarderPDF()">
      <span class="ico">📂</span><div>Telecharger PDF<small>Dans Fichiers iPhone</small></div>
    </button>
    <button class="save-opt" onclick="sauvegarderIMG()">
      <span class="ico">🖼️</span><div>Enregistrer image<small>JPEG puis partage vers Photos</small></div>
    </button>
    <button class="save-opt" onclick="partager()">
      <span class="ico">📤</span><div>Partager<small>Gmail, AirDrop, iMessage</small></div>
    </button>
    <button class="btn-ann2" onclick="fermerSave()">Annuler</button>
  </div>
</div>

<div id="loader"><div class="roue"></div></div>
<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

var pages=[],curPage=0,sigs=[];
var pdfBytes=null,isImg=false,nomFichier='signe.pdf';
var zoom=1,sigActive=null,dragMode=null,drag={};
var sigEnAttente=null;
var DC=document.getElementById('le-canvas');
var CTX=DC.getContext('2d');
var padCanvas=null,padCTX=null,padDessin=false,padX=0,padY=0;

function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('vis');
  clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('vis');},3000);
}
function loader(v){document.getElementById('loader').style.display=v?'flex':'none';}
function afficher(id){document.getElementById(id).style.display='flex';}
function cacher(id){document.getElementById(id).style.display='none';}

document.getElementById('f-pdf').onchange=function(e){if(e.target.files[0])chargerPDF(e.target.files[0]);};
document.getElementById('f-img').onchange=function(e){if(e.target.files[0])chargerIMG(e.target.files[0]);};

async function chargerPDF(fichier){
  loader(true);
  nomFichier=fichier.name.replace(/\.pdf$/i,'')+'-signe.pdf';
  isImg=false;
  try{
    var ab=await fichier.arrayBuffer();
    pdfBytes=new Uint8Array(ab);
    var doc=await pdfjsLib.getDocument({data:pdfBytes}).promise;
    pages=[];
    var p1=await doc.getPage(1);
    var vp1=p1.getViewport({scale:1});
    var dispo=Math.min(window.innerWidth,560);
    var dispoH=window.innerHeight-120;
    var sc=Math.min(dispo/vp1.width,dispoH/vp1.height);
    for(var i=1;i<=doc.numPages;i++){
      var pg=await doc.getPage(i);
      var vp=pg.getViewport({scale:sc});
      var c=document.createElement('canvas');
      c.width=Math.floor(vp.width);c.height=Math.floor(vp.height);
      await pg.render({canvasContext:c.getContext('2d'),viewport:vp}).promise;
      pages.push({c:c,scale:sc});
    }
    sigs=[];curPage=0;zoom=1;
    cacher('accueil');afficher('editeur');
    dessiner();
    toast(doc.numPages+' page(s) chargee(s)');
  }catch(e){toast('Erreur : '+e.message);}
  loader(false);
}

function chargerIMG(fichier){
  loader(true);
  nomFichier=fichier.name.replace(/\.[^.]+$/,'')+'-signe.jpg';
  isImg=true;pdfBytes=null;
  var rd=new FileReader();
  rd.onerror=function(){loader(false);toast('Impossible de lire ce fichier');};
  rd.onload=function(){
    var img=new Image();
    img.onerror=function(){loader(false);toast('Image invalide');};
    img.onload=function(){
      var dispo=Math.min(window.innerWidth,560);
      var dispoH=window.innerHeight-120;
      var sc=Math.min(dispo/img.width,dispoH/img.height,1);
      var w=Math.floor(img.width*sc),h=Math.floor(img.height*sc);
      var c=document.createElement('canvas');
      c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      pages=[{c:c,origImg:img,origW:img.width,origH:img.height,scale:sc}];
      sigs=[];curPage=0;zoom=1;
      loader(false);
      cacher('accueil');afficher('editeur');
      dessiner();
      toast('Image chargee !');
    };
    img.src=rd.result;
  };
  rd.readAsDataURL(fichier);
}

function retour(){
  cacher('editeur');afficher('accueil');
  pages=[];sigs=[];pdfBytes=null;
  document.getElementById('f-pdf').value='';
  document.getElementById('f-img').value='';
}

function dessiner(){
  if(!pages.length)return;
  var pg=pages[curPage];
  var w=Math.floor(pg.c.width*zoom),h=Math.floor(pg.c.height*zoom);
  DC.width=w;DC.height=h;
  DC.style.width=w+'px';DC.style.height=h+'px';
  CTX.drawImage(pg.c,0,0,w,h);
  sigs.filter(function(s){return s.page===curPage;}).forEach(function(s){
    CTX.drawImage(s.img,s.x*zoom,s.y*zoom,s.w*zoom,s.h*zoom);
    if(s===sigActive)dessinerPoignees(s);
  });
}

function dessinerPoignees(s){
  var x=s.x*zoom,y=s.y*zoom,w=s.w*zoom,h=s.h*zoom,R=22;
  CTX.strokeStyle='#39FF14';CTX.lineWidth=2;CTX.setLineDash([5,4]);
  CTX.strokeRect(x,y,w,h);CTX.setLineDash([]);
  CTX.fillStyle='#A020F0';
  CTX.beginPath();CTX.arc(x,y,R,0,Math.PI*2);CTX.fill();
  CTX.fillStyle='#fff';CTX.font='bold 20px system-ui';
  CTX.textAlign='center';CTX.textBaseline='middle';
  CTX.fillText('x',x,y);
  CTX.fillStyle='#39FF14';
  CTX.beginPath();CTX.arc(x+w,y+h,R,0,Math.PI*2);CTX.fill();
  CTX.fillStyle='#000';CTX.fillText('+',x+w,y+h);
}

function dist(ax,ay,bx,by){return Math.sqrt((ax-bx)*(ax-bx)+(ay-by)*(ay-by));}

DC.addEventListener('touchstart',function(e){
  e.preventDefault();
  var t=e.touches[0];
  var r=DC.getBoundingClientRect();
  var cx=(t.clientX-r.left)*(DC.width/r.width);
  var cy=(t.clientY-r.top)*(DC.height/r.height);
  var x=cx/zoom,y=cy/zoom,R=26/zoom;
  var ps=sigs.filter(function(s){return s.page===curPage;});
  for(var i=ps.length-1;i>=0;i--){
    var s=ps[i];
    if(dist(x,y,s.x,s.y)<R){sigs=sigs.filter(function(ss){return ss!==s;});sigActive=null;dessiner();return;}
    if(dist(x,y,s.x+s.w,s.y+s.h)<R){sigActive=s;dragMode='resize';drag={ox:x,oy:y,sw:s.w,sh:s.h};return;}
    if(x>=s.x&&x<=s.x+s.w&&y>=s.y&&y<=s.y+s.h){sigActive=s;dragMode='move';drag={ox:x,oy:y,sx:s.x,sy:s.y};return;}
  }
  sigActive=null;dessiner();
},{passive:false});

DC.addEventListener('touchmove',function(e){
  e.preventDefault();
  if(!sigActive||!dragMode)return;
  var t=e.touches[0];
  var r=DC.getBoundingClientRect();
  var cx=(t.clientX-r.left)*(DC.width/r.width);
  var cy=(t.clientY-r.top)*(DC.height/r.height);
  var x=cx/zoom,y=cy/zoom;
  if(dragMode==='move'){sigActive.x=Math.round(drag.sx+(x-drag.ox));sigActive.y=Math.round(drag.sy+(y-drag.oy));}
  else{sigActive.w=Math.max(40,Math.round(drag.sw+(x-drag.ox)));sigActive.h=Math.max(15,Math.round(drag.sh+(y-drag.oy)));}
  dessiner();
},{passive:false});

DC.addEventListener('touchend',function(e){e.preventDefault();dragMode=null;},{passive:false});

function ouvrirPad(){
  afficher('pad-ecran');
  // Init canvas after display so dimensions are available
  setTimeout(function(){
    padCanvas=document.getElementById('pad-canvas');
    var dpr=window.devicePixelRatio||1;
    var W=padCanvas.offsetWidth;
    var H=padCanvas.offsetHeight;
    padCanvas.width=Math.floor(W*dpr);
    padCanvas.height=Math.floor(H*dpr);
    padCTX=padCanvas.getContext('2d');
    padCTX.scale(dpr,dpr);
    // White background
    padCTX.fillStyle='#ffffff';
    padCTX.fillRect(0,0,W,H);
    // Ink style
    padCTX.strokeStyle='#000000';
    padCTX.lineWidth=3.5;
    padCTX.lineCap='round';
    padCTX.lineJoin='round';
    padDessin=false;
  },50);
}

function fermerPad(){cacher('pad-ecran');}

function effacerPad(){
  if(!padCTX||!padCanvas)return;
  var dpr=window.devicePixelRatio||1;
  var W=padCanvas.offsetWidth,H=padCanvas.offsetHeight;
  padCTX.fillStyle='#ffffff';
  padCTX.fillRect(0,0,W,H);
  padCTX.strokeStyle='#000000';
  padCTX.lineWidth=3.5;
  padCTX.lineCap='round';
  padCTX.lineJoin='round';
}

function padPos(touch){
  var r=padCanvas.getBoundingClientRect();
  var dpr=window.devicePixelRatio||1;
  // Convert touch position to logical canvas coords
  return {
    x:(touch.clientX-r.left),
    y:(touch.clientY-r.top)
  };
}

document.getElementById('pad-canvas').addEventListener('touchstart',function(e){
  e.preventDefault();e.stopPropagation();
  if(!padCTX)return;
  padDessin=true;
  var p=padPos(e.touches[0]);
  padX=p.x;padY=p.y;
  // Draw a dot for taps
  padCTX.beginPath();
  padCTX.arc(padX,padY,1.5,0,Math.PI*2);
  padCTX.fillStyle='#000000';
  padCTX.fill();
},{passive:false});

document.getElementById('pad-canvas').addEventListener('touchmove',function(e){
  e.preventDefault();e.stopPropagation();
  if(!padDessin||!padCTX)return;
  var p=padPos(e.touches[0]);
  padCTX.beginPath();
  padCTX.moveTo(padX,padY);
  padCTX.lineTo(p.x,p.y);
  padCTX.stroke();
  padX=p.x;padY=p.y;
},{passive:false});

document.getElementById('pad-canvas').addEventListener('touchend',function(e){
  e.preventDefault();
  padDessin=false;
},{passive:false});

function utiliserSig(){
  if(!padCTX||!padCanvas){toast('Ouvre le pad dabord');return;}

  // Read raw pixels from the physical canvas
  var pw=padCanvas.width, ph=padCanvas.height;
  var imgData=padCTX.getImageData(0,0,pw,ph);
  var d=imgData.data;

  // 1. Find bounding box of dark pixels
  var t=ph,l=pw,b=0,r=0,found=false;
  for(var y=0;y<ph;y++){
    for(var x=0;x<pw;x++){
      var i=(y*pw+x)*4;
      // Dark pixel = ink
      if(d[i]<180&&d[i+1]<180&&d[i+2]<180){
        found=true;
        if(y<t)t=y; if(y>b)b=y;
        if(x<l)l=x; if(x>r)r=x;
      }
    }
  }
  if(!found){toast('Dessine ta signature dabord');return;}

  // 2. Add padding around ink
  var pad=20;
  l=Math.max(0,l-pad); t=Math.max(0,t-pad);
  r=Math.min(pw,r+pad); b=Math.min(ph,b+pad);
  var cw=r-l, ch=b-t;

  // 3. Create output canvas — 2x for sharpness
  var out=document.createElement('canvas');
  out.width=cw*2; out.height=ch*2;
  var octx=out.getContext('2d');

  // 4. Draw cropped region scaled 2x
  octx.drawImage(padCanvas, l,t,cw,ch, 0,0,cw*2,ch*2);

  // 5. Make every pixel either pure black or transparent
  var od=octx.getImageData(0,0,out.width,out.height);
  var od2=od.data;
  for(var i=0;i<od2.length;i+=4){
    var brightness=(od2[i]+od2[i+1]+od2[i+2])/3;
    if(brightness>200){
      // Near-white = transparent
      od2[i+3]=0;
    } else {
      // Ink = pure black, full opacity
      od2[i]=0; od2[i+1]=0; od2[i+2]=0;
      od2[i+3]=255;
    }
  }
  octx.putImageData(od,0,0);

  var dataUrl=out.toDataURL('image/png');
  var imgFinal=new Image();
  imgFinal.onload=function(){
    sigEnAttente={img:imgFinal,dataUrl:dataUrl};
    fermerPad();
    afficher('overlay-place');
  };
  imgFinal.src=dataUrl;
}

document.getElementById('overlay-place').addEventListener('touchstart',function(e){
  e.preventDefault();
  if(!sigEnAttente){cacher('overlay-place');return;}
  var t=e.touches[0];
  var r=DC.getBoundingClientRect();
  var cx=(t.clientX-r.left)*(DC.width/r.width);
  var cy=(t.clientY-r.top)*(DC.height/r.height);
  var x=cx/zoom,y=cy/zoom;
  var pg=pages[curPage];
  var w=Math.min(200,pg.c.width*0.4),h=Math.round(w*0.35);
  sigs.push({page:curPage,x:Math.max(0,Math.round(x-w/2)),y:Math.max(0,Math.round(y-h/2)),w:w,h:h,img:sigEnAttente.img,dataUrl:sigEnAttente.dataUrl});
  sigActive=sigs[sigs.length-1];
  sigEnAttente=null;
  cacher('overlay-place');
  dessiner();
  toast('Glisse pour bouger — coin vert pour agrandir');
},{passive:false});

function ouvrirSave(){if(!sigs.length){toast('Ajoute une signature dabord');return;}afficher('save-panel');}
function fermerSave(){cacher('save-panel');}

function aplatiPage(i){
  var pg=pages[i];
  var sc=pg.origImg?pg.origW/pg.c.width:1;
  var W=Math.floor(pg.origW||pg.c.width),H=Math.floor(pg.origH||pg.c.height);
  var out=document.createElement('canvas');out.width=W;out.height=H;
  var ctx=out.getContext('2d');
  if(pg.origImg)ctx.drawImage(pg.origImg,0,0,W,H);
  else ctx.drawImage(pg.c,0,0);
  sigs.filter(function(s){return s.page===i;}).forEach(function(s){
    ctx.drawImage(s.img,Math.round(s.x*sc),Math.round(s.y*sc),Math.round(s.w*sc),Math.round(s.h*sc));
  });
  return out;
}

async function construirePDF(){
  var PDFDoc=PDFLib.PDFDocument;
  if(isImg){
    var doc=await PDFDoc.create();
    for(var i=0;i<pages.length;i++){
      var flat=aplatiPage(i);
      var blob=await new Promise(function(r){flat.toBlob(r,'image/jpeg',0.95);});
      var buf=await blob.arrayBuffer();
      var jpg=await doc.embedJpg(buf);
      var p=doc.addPage([flat.width,flat.height]);
      p.drawImage(jpg,{x:0,y:0,width:flat.width,height:flat.height});
    }
    return await doc.save();
  }else{
    var doc=await PDFDoc.load(pdfBytes);
    var pgs=doc.getPages();
    for(var i=0;i<pages.length;i++){
      var pdfPg=pgs[i];var ph=pdfPg.getSize().height;var sc=pages[i].scale;
      for(var j=0;j<sigs.length;j++){
        var s=sigs[j];if(s.page!==i)continue;
        var buf=await fetch(s.dataUrl).then(function(r){return r.arrayBuffer();});
        var img=await doc.embedPng(buf);
        pdfPg.drawImage(img,{x:s.x/sc,y:ph-(s.y/sc)-(s.h/sc),width:s.w/sc,height:s.h/sc});
      }
    }
    return await doc.save();
  }
}

function telecharger(blob,nom){
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download=nom;a.click();
  setTimeout(function(){URL.revokeObjectURL(url);},8000);
}

async function sauvegarderPDF(){
  loader(true);
  var bytes=await construirePDF();
  telecharger(new Blob([bytes],{type:'application/pdf'}),nomFichier);
  loader(false);fermerSave();toast('PDF dans Fichiers !');
}

async function sauvegarderIMG(){
  loader(true);
  var flat=aplatiPage(curPage);
  var blob=await new Promise(function(r){flat.toBlob(r,'image/jpeg',0.95);});
  telecharger(blob,nomFichier.replace(/\.pdf$/i,'.jpg'));
  loader(false);fermerSave();toast('Image dans Fichiers');
}

async function partager(){
  if(!navigator.share){toast('Telecharge le PDF puis partage depuis Fichiers');fermerSave();return;}
  loader(true);
  var bytes=await construirePDF();
  var file=new File([bytes],nomFichier,{type:'application/pdf'});
  loader(false);
  try{await navigator.share({files:[file],title:'Document signe'});fermerSave();}
  catch(e){toast('Partage annule');}
}
</script>
